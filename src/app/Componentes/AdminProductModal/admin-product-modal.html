<div class="modal-backdrop" *ngIf="open">
  <div class="modal-card">
    <header class="modal-header">
      <div>
        <p class="eyebrow">Administrador</p>
        <h2>{{ product ? 'Editar producto' : 'Nuevo producto' }}</h2>
      </div>
      <button type="button" class="icon-btn" (click)="close()" [disabled]="loading">×</button>
    </header>

    <form class="modal-form" (ngSubmit)="submit()">
      <div class="preview">
        <img [src]="form.imageUrl || 'https://via.placeholder.com/640x400?text=Sin+imagen'" [alt]="form.name || 'Vista previa del producto'" />
      </div>

      <label>
        Nombre
        <input name="name" [(ngModel)]="form.name" placeholder="Nombre del producto" [disabled]="loading" />
      </label>

      <div class="two-cols">
        <label>
          Precio
          <input name="price" type="number" min="0" step="0.01" [(ngModel)]="form.price" [disabled]="loading" />
        </label>

        <label>
          Stock
          <input name="inStock" type="number" min="0" step="1" [(ngModel)]="form.inStock" [disabled]="loading" />
        </label>
      </div>

      <label>
        Imagen
        <input name="imageUrl" [(ngModel)]="form.imageUrl" placeholder="URL de imagen" [disabled]="loading" />
      </label>

      <label>
        Categoría
        <select name="category" [(ngModel)]="form.category" [disabled]="loading" class="styled-select">
          <option value="">Seleccione categoría</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ (cat && cat.length) ? (cat[0].toUpperCase() + cat.slice(1)) : cat }}</option>
        </select>
      </label>

      <label>
        Descripción corta
        <input name="sDescription" [(ngModel)]="form.sDescription" placeholder="Descripción corta" [disabled]="loading" />
      </label>

      <label>
        Descripción
        <textarea name="description" rows="5" [(ngModel)]="form.description" placeholder="Descripción completa" [disabled]="loading"></textarea>
      </label>

      <div *ngIf="errorMessage" class="error-box">{{ errorMessage }}</div>

      <footer class="modal-actions">
        <button type="button" class="secondary-btn" (click)="close()" [disabled]="loading">Cancelar</button>
        <button *ngIf="product" type="button" class="danger-btn" (click)="onDelete()" [disabled]="loading">
          {{ product.isActive === 0 ? 'Regresar' : 'Quitar' }}
        </button>
        <button type="submit" class="primary-btn" [disabled]="loading">{{ loading ? 'Guardando...' : (product ? 'Guardar cambios' : 'Crear producto') }}</button>
      </footer>
    </form>
  </div>
</div>
