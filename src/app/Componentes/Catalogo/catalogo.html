<router-outlet></router-outlet>

<div class="banner">
    <h2><a href="/" class="brand-link">Walmart Romano</a></h2>
</div>

<header class="header">
    <div class="catalog-filter">
        <select id="category-select" class="category-select" (change)="onCategoryChange($any($event.target).value)">
            <option value="">Todas las categorías</option>
            <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
        </select>
    </div>

    <div class="catalog-search">
        <input id="catalog-search-input" type="search" placeholder="Buscar (coincidencia exacta: nombre o categoría)" (input)="onSearchInput($event)" [value]="searchQuery" autocomplete="off" spellcheck="false" />
    </div>

    <button class="cart-button" (click)="goToCart()" aria-label="Ir al carrito">
        <span class="cart-button__icon" aria-hidden="true"></span>
        <span class="cart-button__count">{{counter}}</span>
    </button>
</header>

<section class="grid">
    <div *ngIf="!displayedProducts || displayedProducts.length === 0" class="no-products">
        No se encontraron productos. Verifica que el backend esté corriendo en <strong>http://localhost:3000</strong> y recarga la página.
    </div>

    <ng-container *ngIf="displayedProducts && displayedProducts.length">
        <app-producto-card *ngFor="let p of displayedProducts" [products]="p"></app-producto-card>
    </ng-container>

</section>
