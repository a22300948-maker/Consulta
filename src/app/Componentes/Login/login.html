<div class="banner">
    <h2><a href="/" class="brand-link">Walmart Romano</a></h2>
</div>

<header class="header">
    <div class="header-left">
        <span class="auth-badge">Acceso</span>
    </div>
    <div class="header-right">
        <a href="/registro" class="home-link">← Volver al registro</a>
    </div>
</header>

<section class="auth-page">
    <div class="auth-card">
        <h1>Iniciar sesión</h1>
        <p class="auth-subtitle">Accede para explorar el catálogo y procesar tu compra.</p>

        <form (ngSubmit)="submit()">
            <label>
                Usuario
                <input name="username" [(ngModel)]="username" placeholder="Nombre de usuario" autocomplete="username" />
            </label>

            <label>
                Contraseña
                <input name="password" type="password" [(ngModel)]="password" placeholder="Contraseña" autocomplete="current-password" />
            </label>

            <div *ngIf="errorMessage" class="auth-error">{{ errorMessage }}</div>

            <button type="submit" [disabled]="loading">{{ loading ? 'Validando...' : 'Ingresar' }}</button>

            <p class="auth-note">¿Aún no tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
        </form>
    </div>
</section>
