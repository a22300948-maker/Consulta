
<article class="card">
    <img src="{{products.imageUrl}}" class ="img" alt="{{products.name}}" (click)="openDetail()">
    <div class="body">
        <h2 (click)="openDetail()">{{products.name}}</h2>
        <p>Price: ${{products.price}}</p>
    </div>
    <p class ="meta">ID: {{products.id}}</p>
    <p class="desc">{{products.description}}</p>
    <p class="stock" [class.in-stock]="products.inStock" [class.out-of-stock]="!products.inStock">
        @if(products.inStock){En Stock}
        @else {Agotado}
    </p>

    <div class="cart-controls">
        <button class="qty-btn" type="button" (click)="decrease()" [disabled]="countInCart <= 0" title="Eliminar" aria-label="Eliminar">−</button>
        <span class="cart-count">{{countInCart}}</span>
        <button class="qty-btn" type="button" (click)="increase()" [disabled]="!products.inStock" title="{{ products.inStock ? 'Añadir' : 'Agotado' }}" aria-label="Añadir">+</button>
    </div>

</article>
