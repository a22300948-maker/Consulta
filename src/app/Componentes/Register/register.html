<div class="banner">
    <h2><a href="/" class="brand-link">Walmart Romano</a></h2>
</div>

<header class="header">
    <div class="header-left">
        <span class="auth-badge">Registro</span>
    </div>
    <div class="header-right">
        <a href="/login" class="home-link">← Volver al Log-In</a>
    </div>
</header>

<section class="auth-page">
    <div class="auth-card">
        <h1>Crear cuenta</h1>
        <p class="auth-subtitle">Regístrate para acceder al mercado romano y gestionar tu carrito.</p>

        <form (ngSubmit)="submit()">
            <label>
                Usuario
                <input name="username" [(ngModel)]="username" placeholder="Nombre de usuario" autocomplete="username" (input)="clearError()" />
            </label>

            <label>
                Email
                <input name="email" type="email" [(ngModel)]="email" placeholder="Correo electrónico" autocomplete="email" (input)="clearError()" />
            </label>

            <label>
                Contraseña
                <input name="password" type="password" [(ngModel)]="password" placeholder="Contraseña" autocomplete="new-password" (input)="clearError()" />
            </label>

            <label>
                Repetir contraseña
                <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" placeholder="Repite contraseña" autocomplete="new-password" (input)="clearError()" />
            </label>

            <div *ngIf="errorMessage" class="auth-error">{{ errorMessage }}</div>

            <button type="submit" [disabled]="loading" [class.error-state]="hasError">{{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}</button>

            <p class="auth-note">¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p>
        </form>
    </div>
</section>
