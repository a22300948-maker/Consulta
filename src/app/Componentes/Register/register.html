<section class="auth-page">
  <div class="auth-card">
    <span class="auth-badge">Registro</span>
    <h1>Crear cuenta</h1>
    <p class="auth-subtitle">Regístrate para acceder al mercado romano y gestionar tu carrito.</p>

    <form (ngSubmit)="submit()">
      <label>
        Usuario
        <input name="username" [(ngModel)]="username" placeholder="Nombre de usuario" autocomplete="username" />
      </label>

      <label>
        Email
        <input name="email" type="email" [(ngModel)]="email" placeholder="Correo electrónico" autocomplete="email" />
      </label>

      <label>
        Contraseña
        <input name="password" type="password" [(ngModel)]="password" placeholder="Contraseña" autocomplete="new-password" />
      </label>

      <label>
        Repetir contraseña
        <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" placeholder="Repite contraseña" autocomplete="new-password" />
      </label>

      <div *ngIf="errorMessage" class="auth-error">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading">{{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}</button>

      <p class="auth-note">¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </form>
  </div>
</section>
