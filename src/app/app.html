
<router-outlet></router-outlet>

<!-- Toast global -->
<div class="toast" [class.show]="toastVisible">{{toastMessage}}</div>

<div *ngIf="selectedProduct" class="product-modal-overlay" (click)="closeProductModal()">
	<div class="product-modal" (click)="$event.stopPropagation()">
		<button class="modal-close" (click)="closeProductModal()">✕</button>
		<div class="modal-body">
			<img [src]="selectedProduct.imageUrl" alt="{{selectedProduct.name}}" class="modal-img" />
			<div class="modal-info">
				<h2>{{selectedProduct.name}}</h2>
				<p class="modal-id">ID: {{selectedProduct.id}}</p>
				<p class="modal-price">Precio: ${{selectedProduct.price.toFixed(2)}}</p>
				<p class="modal-stock" [class.in-stock]="selectedProduct.inStock > 0" [class.out-of-stock]="selectedProduct.inStock <= 0">
					<span *ngIf="selectedProduct.inStock > 0">En Stock ({{selectedProduct.inStock}})</span>
					<span *ngIf="selectedProduct.inStock <= 0">Agotado</span>
				</p>
				<div class="modal-qty-row">
					<button class="qty-btn" (click)="decreaseProduct(selectedProduct)">−</button>
					<input class="qty-input" type="number" min="0" [value]="getProductQty(selectedProduct.id)" (input)="onModalQtyInput($event)" (blur)="onModalQtyCommit(selectedProduct)" (keydown.enter)="onModalQtyCommit(selectedProduct)">
					<button class="qty-btn" (click)="increaseProduct(selectedProduct)">+</button>
				</div>
				<p class="modal-desc">{{selectedProduct.description}}</p>
			</div>
		</div>
	</div>
</div>

<footer class="site-footer">
	<div class="site-footer-inner">
		<p class="brand">Walmart Romano</p>
		<nav class="footer-links">
				<a routerLink="/">Inicio</a>
			<a routerLink="/catalogo">Catálogo</a>
			<a routerLink="/carrito">Carrito</a>
		</nav>
		<p class="copy">© Walmart Romano</p>
	</div>
</footer>
