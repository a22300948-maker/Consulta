<router-outlet></router-outlet>

<div class="banner">
    <h2><a routerLink="/" class="brand-link">Walmart Romano</a></h2>
</div>

<header class="header">
    <h1>Catálogo</h1>
    <button class="cart-button" (click)="goToCart()">({{counter}}) Go to Cart</button>
</header>

<section class="grid">
    @if (products$ | async; as products) {
        @for (p of products; track p.id) {
            <app-producto-card
                [products]="p">
            </app-producto-card>
        }
    }

</section>
