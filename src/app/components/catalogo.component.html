<router-outlet></router-outlet>

<div class="banner">
    <h2>Walmart Romano</h2>
</div>

<header class="header">
    <h1>Catálogo</h1>
    <button class="cart-button" (click)="goToCart()">({{counter}}) Go to Cart</button>
</header>

<section class="grid">

    @for(p of products; track p.id){

        <app-producto-card 
            [products]="p"
            (add)="addToCart($event)">
        </app-producto-card>

    }

</section>
